
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الذكاء العاطفي</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Tajawal", sans-serif;
            background: linear-gradient(135deg, #0f3d1e, #a5d6a7, #1b5e20, #c8e6c9);
            background-size: 400% 400%;
            animation: gradientFlow 14s ease infinite;
            min-height: 100vh;
            position: relative;
            color: #1b5e20;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 0%; }
            75% { background-position: 0% 0%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        .navbar {
            position: relative;
            z-index: 5;
            width: 100%;
            padding: 15px 40px;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255,255,255,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeDown 0.8s ease forwards;
            opacity: 0;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .navbar h1 {
            color: #0f3d1e;
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .back-btn {
            padding: 10px 18px;
            background: #2e7d32;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #43a047;
            transform: translateY(-2px);
        }

        .content {
            position: relative;
            z-index: 5;
            padding: 40px;
            max-width: 900px;
            margin: auto;
            animation: fadeUp 1s ease forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-box {
            background: rgba(255,255,255,0.85);
            border: 1px solid #dcedc8;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            animation: cardPop 0.7s ease forwards;
            opacity: 0;
        }

        @keyframes cardPop {
            0% { opacity: 0; transform: scale(0.92); }
            100% { opacity: 1; transform: scale(1); }
        }

        .question-box h3 {
            color: #1b5e20;
            margin-bottom: 12px;
            font-size: 20px;
            font-weight: bold;
        }

        .question-box label {
            display: block;
            margin-bottom: 12px;
            color: #33691e;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 10px;
            transition: 0.25s;
        }

        .question-box label:hover {
            background: #e8f5e9;
            transform: translateX(-4px);
        }

        .btn {
            padding: 14px 20px;
            background: #1b5e20;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            border: none;
            font-size: 17px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.18);
            animation: fadeUp 1.2s ease forwards;
            opacity: 0;
        }

        .btn:hover {
            background: #43a047;
            transform: translateY(-3px);
        }
        /* ===========================
   🌿 GLOBAL FIXES
=========================== */
body {
    overflow-x: hidden;
}

img {
    max-width: 100%;
}

/* ===========================
   🌿 MOBILE-FIRST BASE
=========================== */

/* NAVBAR */
.navbar {
    padding: 12px 20px;
    flex-direction: column;
    gap: 10px;
    text-align: center;
}

.navbar h1 {
    font-size: 20px;
}

/* BACK BUTTON */
.back-btn {
    width: 100%;
    max-width: 180px;
    padding: 10px 14px;
    font-size: 14px;
    position: static;
    margin-top: 10px;
}

/* CONTENT */
.content {
    padding: 25px;
    max-width: 100%;
}

.section-title {
    font-size: 22px;
    text-align: center;
}

/* QUESTION BOX */
.question-box {
    padding: 16px;
    border-radius: 16px;
}

.question-box h3 {
    font-size: 18px;
}

.question-box label {
    font-size: 14px;
    padding: 10px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px 16px;
    font-size: 15px;
}

/* ===========================
   🌿 MEDIUM SCREENS ≥ 600px
=========================== */
@media (min-width: 600px) {

    .navbar {
        flex-direction: row;
        justify-content: space-between;
        padding: 15px 40px;
        text-align: right;
    }

    .navbar h1 {
        font-size: 22px;
    }

    .back-btn {
        width: auto;
        margin: 0;
    }

    .content {
        padding: 30px;
        max-width: 700px;
    }

    .section-title {
        font-size: 24px;
    }

    .question-box {
        padding: 20px;
    }

    .question-box h3 {
        font-size: 20px;
    }

    .question-box label {
        font-size: 15px;
    }

    .btn {
        padding: 14px 20px;
        font-size: 16px;
    }
}

/* ===========================
   🌿 LARGE SCREENS ≥ 900px
=========================== */
@media (min-width: 900px) {

    .navbar h1 {
        font-size: 24px;
    }

    .content {
        padding: 40px;
        max-width: 900px;
    }

    .section-title {
        font-size: 26px;
    }

    .question-box {
        padding: 25px;
    }

    .question-box h3 {
        font-size: 22px;
    }

    .question-box label {
        font-size: 16px;
    }

    .btn {
        font-size: 17px;
    }
}

    </style>
</head>

<body>

    <div class="navbar">
        <h1>اختبار الذكاء العاطفي</h1>
        <button class="back-btn" onclick="window.location.href='self-tests.html'">رجوع</button>
    </div>

    <div class="content">

        <div class="question-box">
            <h3>السؤال 1</h3>

            <label><input type="radio" name="q1" value="أواجه صعوبة في فهم مشاعري."> أواجه صعوبة في فهم مشاعري.</label>
        </div>

        <div class="question-box">
            <h3>السؤال 2</h3>
            <label><input type="radio" name="q2" value="أستطيع تهدئة نفسي عند الغضب."> أستطيع تهدئة نفسي عند الغضب.</label>
            <label><input type="radio" name="q2" value="أفقد السيطرة بسهولة."> أفقد السيطرة بسهولة.</label>
        </div>

        <div class="question-box">
            <h3>السؤال 3</h3>
            <label><input type="radio" name="q3" value="أتعاطف مع الآخرين بسهولة."> أتعاطف مع الآخرين بسهولة.</label>
            <label><input type="radio" name="q3" value="أجد صعوبة في فهم الآخرين."> أجد صعوبة في فهم الآخرين.</label>
        </div>

        <button class="btn" id="submitBtn">إرسال الإجابات</button>

    </div> </body> </html>
