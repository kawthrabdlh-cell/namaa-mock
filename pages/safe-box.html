<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق الدعم الآمن</title>

    <style>
       body {
    margin: 0;
    padding: 40px 0;
    font-family: "Tajawal", sans-serif;

    /* خلفية فاتحة Gradient بدل الأخضر الغامق */
    background: linear-gradient(135deg, #ffffff, #eaffea, #d6f8d6);
    min-height: 100vh;
    position: relative;
    overflow-y: auto;

    color: #1b3d1b; /* غامق لأنو الثيم فاتح */
}

/* دوائر الأنيميشن – نفسن بس أغمق شوي ليبينو */
.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(46, 125, 50, 0.35);
    animation: float 12s infinite ease-in-out;
    filter: blur(4px);
}

.circle:nth-child(1) { width: 220px; height: 220px; top: -40px; right: -60px; animation-duration: 14s; }
.circle:nth-child(2) { width: 300px; height: 300px; bottom: -80px; left: -50px; animation-duration: 18s; }
.circle:nth-child(3) { width: 180px; height: 180px; top: 40%; left: 20%; animation-duration: 16s; }

@keyframes float {
    0% { transform: translateY(0) scale(1); opacity: 0.7; }
    50% { transform: translateY(-40px) scale(1.1); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 0.7; }
}

/* Sparkles غامقين خفاف بدل الطبقة السودا */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;

    background:
        radial-gradient(circle at 15% 20%, rgba(0,60,20,0.18), transparent 55%),
        radial-gradient(circle at 80% 30%, rgba(0,70,25,0.16), transparent 55%),
        radial-gradient(circle at 25% 80%, rgba(0,50,15,0.14), transparent 55%);
}

/* NAVBAR */
.navbar {
    position: relative;
    z-index: 5;
    width: 100%;
    padding: 15px 40px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,0,0,0.12);
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeDown 0.8s ease forwards;
    opacity: 0;
}

@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

.navbar h1 {
    color: #1b3d1b;
    margin: 0;
    font-size: 24px;
    font-weight: 700;
}

.back-btn {
    padding: 10px 18px;
    background: #1b5e20;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    border: none;
    transition: 0.3s;
}

.back-btn:hover {
    background: #2e7d32;
    transform: translateY(-2px);
}

/* CONTENT */
.content {
    position: relative;
    z-index: 5;
    padding: 40px;
    max-width: 900px;
    margin: auto;
    animation: fadeUp 1s ease forwards;
    opacity: 0;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

.section-title {
    font-size: 26px;
    color: #1b3d1b;
    margin-bottom: 20px;
    font-weight: bold;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 180px;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #1b5e20;
    font-size: 16px;
    resize: none;
    margin-bottom: 20px;
    background: rgba(255,255,255,0.9);
    color: #1b3d1b;
    backdrop-filter: blur(6px);
    transition: 0.3s;
}

textarea:focus {
    border-color: #66bb6a;
    background: rgba(255,255,255,1);
}

/* BUTTON */
.btn {
    padding: 12px 20px;
    background: #1b5e20;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    border: none;
    transition: 0.3s;
    width: 100%;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    margin-bottom: 20px;
}

.btn:hover {
    background: #2e7d32;
    transform: translateY(-3px);
}

/* SELECT + INPUT */
select, input[type="datetime-local"] {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #1b5e20;
    background: rgba(255,255,255,0.9);
    color: #1b3d1b;
    margin-bottom: 20px;
    font-size: 16px;
    backdrop-filter: blur(6px);
}
/* ===========================
   🌿 GLOBAL FIXES
   =========================== */
body {
    overflow-x: hidden;
}

img {
    max-width: 100%;
    height: auto;
}

/* ===========================
   🌿 MOBILE-FIRST BASE
   =========================== */

/* NAVBAR */
.navbar {
    padding: 12px 20px;
    flex-direction: column;
    gap: 10px;
    text-align: center;
}

.navbar h1 {
    font-size: 20px;
}

.back-btn {
    width: 100%;
    max-width: 180px;
    font-size: 14px;
    padding: 10px 14px;
}

/* CONTENT */
.content {
    padding: 20px;
    max-width: 100%;
}

.section-title {
    font-size: 20px;
    text-align: center;
}

/* TEXTAREA */
textarea {
    height: 150px;
    font-size: 14px;
    padding: 12px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 10px 16px;
    font-size: 14px;
}

/* SELECT + INPUT */
select,
input[type="datetime-local"] {
    font-size: 14px;
    padding: 10px;
}

/* FLOATING CIRCLES */
.circle:nth-child(1),
.circle:nth-child(2),
.circle:nth-child(3) {
    filter: blur(6px);
    opacity: 0.6;
}

/* ===========================
   🌿 MEDIUM SCREENS ≥ 600px
   =========================== */
@media (min-width: 600px) {

    .navbar {
        flex-direction: row;
        justify-content: space-between;
        padding: 15px 40px;
        text-align: right;
    }

    .navbar h1 {
        font-size: 22px;
    }

    .back-btn {
        width: auto;
        padding: 10px 18px;
    }

    .content {
        padding: 30px;
        max-width: 700px;
    }

    .section-title {
        font-size: 24px;
    }

    textarea {
        height: 170px;
        font-size: 15px;
    }

    .btn {
        padding: 12px 20px;
        font-size: 15px;
    }

    select,
    input[type="datetime-local"] {
        font-size: 15px;
        padding: 12px;
    }
}

/* ===========================
   🌿 LARGE SCREENS ≥ 900px
   =========================== */
@media (min-width: 900px) {

    .navbar h1 {
        font-size: 24px;
    }

    .content {
        padding: 40px;
        max-width: 850px;
    }

    .section-title {
        font-size: 26px;
    }

    textarea {
        height: 180px;
        font-size: 16px;
    }

    .btn {
        font-size: 16px;
    }

    select,
    input[type="datetime-local"] {
        font-size: 16px;
    }
}


    </style>
</head>

<body>

    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="navbar">
        <h1>صندوق الدعم الآمن</h1>
        <button class="back-btn" onclick="window.location.href='student-dashboard.html'">رجوع</button>
    </div>

    <div class="content">

        <h2 class="section-title">اكتبي استشارتكِ بسرية تامة</h2>

        <textarea id="consultText" placeholder="اكتبي مشكلتكِ أو استفساركِ هنا..."></textarea>

        <button class="btn" id="sendConsult">إرسال الاستشارة</button>

        <h2 class="section-title">حجز موعد مع المرشدة</h2>

        <select id="sessionType">
            <option disabled selected>اختاري نوع الجلسة</option>
            <option value="face-to-face">جلسة وجهًا لوجه</option>
            <option value="online">جلسة عبر Teams/Zoom</option>
        </select>

        <input type="datetime-local" id="appointmentTime">

        <button class="btn" id="bookBtn">حجز الموعد</button>

    </div> </body> </html>
