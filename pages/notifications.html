<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إرسال الإشعارات للطالبات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
       body {
    margin: 0;
    padding: 40px 0;
    font-family: "Tajawal", sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-y: auto;

    /* ثيم فاتح: أبيض + أخضر فاتح */
    background: linear-gradient(135deg, #ffffff, #e8ffe8, #c5f4cc);
    color: #1b3d1b;
}

/* دوائر الأنيميشن – نفس الحركة بس اللون أغمق شوي ليبينوا على الخلفية الفاتحة */
.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(8, 47, 5, 0.25);
    animation: float 12s infinite ease-in-out;
    filter: blur(4px);
}
.circle:nth-child(1) { width: 220px; height: 220px; top: -40px; right: -60px; }
.circle:nth-child(2) { width: 300px; height: 300px; bottom: -80px; left: -50px; }
.circle:nth-child(3) { width: 180px; height: 180px; top: 40%; left: 20%; }

@keyframes float {
    0% { transform: translateY(0) scale(1); opacity: 0.7; }
    50% { transform: translateY(-40px) scale(1.1); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 0.7; }
}

/* بدل الطبقة السودا: sparkles غامقين خفاف بالخلفية */
body::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
    background:
        radial-gradient(circle at 15% 20%, rgba(0, 60, 20, 0.18), transparent 55%),
        radial-gradient(circle at 80% 30%, rgba(0, 70, 25, 0.16), transparent 55%),
        radial-gradient(circle at 25% 80%, rgba(0, 50, 15, 0.14), transparent 55%);
}

.navbar {
    position: relative;
    z-index: 5;
    width: 100%;
    padding: 15px 40px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h1 {
    color: #1b3d1b;
    margin: 0;
    font-size: 24px;
    font-weight: 700;
}

.back-btn {
    padding: 10px 18px;
    background: #2e7d32;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    border: none;
}

.content {
    position: relative;
    z-index: 5;
    padding: 30px 20px 50px;
    max-width: 900px;
    margin: auto;
}

.section-title {
    font-size: 22px;
    color: #1b3d1b;
    margin: 25px 0 15px;
    font-weight: bold;
}

textarea, select, input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #1b5e20;
    background: rgba(255,255,255,0.9);
    color: #1b3d1b;
    font-size: 16px;
    margin-bottom: 20px;
    backdrop-filter: blur(6px);
}

textarea {
    height: 140px;
    resize: none;
}

.btn {
    padding: 12px 20px;
    background: #1b5e20;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    border: none;
    width: 100%;
    transition: 0.3s;
}

.btn:hover {
    background: #2e7d32;
    transform: translateY(-3px);
}

.btn-all {
    background: #00695c;
}

.btn-all:hover {
    background: #00897b;
}

.btn-parent {
    background: #4e342e;
}

.btn-parent:hover {
    background: #6d4c41;
}

.templates {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
}

.template-card {
    background: rgba(255,255,255,0.85);
    border-radius: 14px;
    padding: 16px;
    border: 1px solid rgba(0,0,0,0.08);
    cursor: pointer;
    transition: 0.3s;
}

.template-card:hover {
    background: rgba(255,255,255,0.95);
    transform: translateY(-3px);
}

.template-title {
    font-weight: bold;
    color: #1b5e20;
    margin-bottom: 6px;
}

.template-text {
    opacity: 0.9;
    color: #2e4d2e;
}
/* ===========================
   🌿 GLOBAL FIXES
   =========================== */
body {
    overflow-x: hidden;
}

img {
    max-width: 100%;
    height: auto;
}

/* ===========================
   🌿 MOBILE-FIRST BASE
   =========================== */

/* NAVBAR */
.navbar {
    padding: 12px 20px;
    flex-direction: column;
    gap: 10px;
    text-align: center;
}

.navbar h1 {
    font-size: 20px;
}

/* BACK BUTTON */
.back-btn {
    width: 100%;
    max-width: 180px;
    padding: 10px 14px;
    font-size: 14px;
    position: static;
    margin-top: 10px;
}

/* CONTENT */
.content {
    padding: 20px;
    max-width: 100%;
}

.section-title {
    font-size: 20px;
    text-align: center;
}

/* INPUTS */
textarea,
select,
input {
    font-size: 14px;
    padding: 12px;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 10px 16px;
    font-size: 14px;
}

.btn-all,
.btn-parent {
    font-size: 14px;
}

/* TEMPLATES GRID */
.templates {
    grid-template-columns: 1fr;
    gap: 12px;
}

.template-card {
    padding: 14px;
}

.template-title {
    font-size: 15px;
}

.template-text {
    font-size: 13px;
}

/* FLOATING CIRCLES */
.circle:nth-child(1),
.circle:nth-child(2),
.circle:nth-child(3) {
    filter: blur(6px);
    opacity: 0.6;
}

/* ===========================
   🌿 MEDIUM SCREENS ≥ 600px
   =========================== */
@media (min-width: 600px) {

    .navbar {
        flex-direction: row;
        justify-content: space-between;
        padding: 15px 40px;
        text-align: right;
    }

    .navbar h1 {
        font-size: 22px;
    }

    .back-btn {
        width: auto;
        position: static;
        margin: 0;
    }

    .content {
        padding: 30px;
        max-width: 700px;
    }

    .section-title {
        font-size: 22px;
    }

    textarea,
    select,
    input {
        font-size: 15px;
        padding: 14px;
    }

    .btn {
        padding: 12px 20px;
        font-size: 15px;
    }

    .templates {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
    }

    .template-card {
        padding: 16px;
    }

    .template-title {
        font-size: 16px;
    }

    .template-text {
        font-size: 14px;
    }
}

/* ===========================
   🌿 LARGE SCREENS ≥ 900px
   =========================== */
@media (min-width: 900px) {

    .navbar h1 {
        font-size: 24px;
    }

    .content {
        padding: 40px;
        max-width: 900px;
    }

    .section-title {
        font-size: 24px;
    }

    textarea,
    select,
    input {
        font-size: 16px;
    }

    .btn {
        font-size: 16px;
    }

    .templates {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
    }

    .template-card {
        padding: 18px;
    }

    .template-title {
        font-size: 17px;
    }

    .template-text {
        font-size: 15px;
    }
}


    </style>
</head>

<body>

    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="navbar">
        <h1>إرسال الإشعارات للطالبات</h1>
        <button class="back-btn" onclick="window.location.href='counselor-dashboard.html'">رجوع</button>
    </div>

    <div class="content">

        <h2 class="section-title">اختاري الطالبة</h2>
        <select id="studentSelect">
            <option disabled selected>اختاري الطالبة</option>
        </select>

        <h2 class="section-title">النماذج الجاهزة</h2>
        <div class="templates">
            <div class="template-card" onclick="useTemplate('نصيحة اليوم', 'تذكّري أن كل يوم هو فرصة جديدة للتقدم!')">
                <div class="template-title">نصيحة اليوم</div>
                <div class="template-text">تذكّري أن كل يوم هو فرصة جديدة للتقدم!</div>
            </div>

            <div class="template-card" onclick="useTemplate('تشجيع', 'أنتِ قادرة على تحقيق أهدافك، تابعي بقوة!')">
                <div class="template-title">تشجيع</div>
                <div class="template-text">أنتِ قادرة على تحقيق أهدافك، تابعي بقوة!</div>
            </div>

            <div class="template-card" onclick="useTemplate('تنبيه', 'يرجى الانتباه إلى مواعيدك القادمة وعدم التأخر.')">
                <div class="template-title">تنبيه</div>
                <div class="template-text">يرجى الانتباه إلى مواعيدك القادمة وعدم التأخر.</div>
            </div>

            <div class="template-card" onclick="useTemplate('تذكير', 'لا تنسي تجهيز دفترك لجلسة الإرشاد القادمة.')">
                <div class="template-title">تذكير</div>
                <div class="template-text">لا تنسي تجهيز دفترك لجلسة الإرشاد القادمة.</div>
            </div>
        </div>

        <h2 class="section-title">إشعار مخصص</h2>

        <input id="notifTitle" placeholder="عنوان الإشعار (اختياري)">
        <textarea id="notifMessage" placeholder="اكتبي نص الإشعار..."></textarea>

        <button class="btn" id="sendNotif">إرسال الإشعار لطالبة معيّنة</button>
        <button class="btn btn-all" id="sendToAll">إرسال الإشعار لجميع الطالبات</button>

        <!-- ⭐ زر جديد: إرسال لولي الأمر -->
        <button class="btn btn-parent" id="sendToParent">إرسال لولي الأمر</button>

    </div>
