
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الجرعات النفسية</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Tajawal", sans-serif;
            background: url('wallpaper.jpeg') center/cover no-repeat fixed;
            min-height: 100vh;
            position: relative;
        }

        /* Brightness overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.35);
            z-index: 1;
            pointer-events: none;
        }

        /* HEADER */
        .navbar {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 10px 30px; /* أرفع */
            background: rgba(27, 94, 32, 0.55); /* أخضر شفاف */
            backdrop-filter: blur(6px); /* blur خفيف */
            border-bottom: 1px solid rgba(255,255,255,0.35);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px; /* أرفع بصرياً */
            font-weight: 700;
            text-shadow: 0 2px 6px rgba(0,0,0,0.35);
        }

        .navbar img {
            width: 85px; /* أصغر ليتناسب مع الهيدر الأرفع */
            height: 85px;
            object-fit: contain;
            margin-left: 20px;
        }

        .back-btn {
            padding: 10px 20px;
            background: #1b5e20;
            color: #ffffff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #2e7d32;
            transform: translateY(-2px);
        }

        /* CONTENT */
        .content {
            position: relative;
            z-index: 5;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        .section-title {
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 25px;
            font-weight: bold;
            text-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }

        /* CARD STYLE — blur inside only */
        .item {
            position: relative;
            z-index: 20;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.35);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px); /* blur خفيف */
            margin-bottom: 25px;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.35);
        }

        .item:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.25);
        }

        /* IMAGE INSIDE CARD */
        .item img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .item h3 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 22px;
        }

        .item p {
            color: #eaeaea;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .btn {
            padding: 10px 18px;
            background: #1b5e20;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2e7d32;
            transform: scale(1.05);
        }
        /* ===========================
   🌿 GLOBAL FIXES
   =========================== */
body {
    overflow-x: hidden;
}

img {
    max-width: 100%;
    height: auto;
}

/* ===========================
   🌿 MOBILE-FIRST BASE
   =========================== */

/* NAVBAR */
.navbar {
    padding: 10px 16px;
    flex-direction: column;
    gap: 10px;
    text-align: center;
}

.navbar h1 {
    font-size: 20px;
}

.navbar img {
    width: 70px;
    height: 70px;
    margin: 0;
}

/* BACK BUTTON */
.back-btn {
    width: 100%;
    max-width: 180px;
    padding: 10px 14px;
    font-size: 14px;
    position: static;
    margin-top: 10px;
}

/* CONTENT */
.content {
    padding: 20px;
    max-width: 100%;
}

.section-title {
    font-size: 22px;
    text-align: center;
}

/* CARD */
.item {
    padding: 18px;
    border-radius: 16px;
}

.item h3 {
    font-size: 18px;
}

.item p {
    font-size: 14px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 10px 16px;
    font-size: 14px;
}

/* ===========================
   🌿 MEDIUM SCREENS ≥ 600px
   =========================== */
@media (min-width: 600px) {

    .navbar {
        flex-direction: row;
        justify-content: space-between;
        padding: 12px 30px;
        text-align: right;
    }

    .navbar h1 {
        font-size: 22px;
    }

    .navbar img {
        width: 80px;
        height: 80px;
    }

    .back-btn {
        width: auto;
        margin: 0;
    }

    .content {
        padding: 30px;
        max-width: 700px;
    }

    .section-title {
        font-size: 26px;
    }

    .item {
        padding: 22px;
    }

    .item h3 {
        font-size: 20px;
    }

    .item p {
        font-size: 15px;
    }

    .btn {
        width: auto;
        padding: 12px 20px;
        font-size: 15px;
    }
}

/* ===========================
   🌿 LARGE SCREENS ≥ 900px
   =========================== */
@media (min-width: 900px) {

    .navbar h1 {
        font-size: 24px;
    }

    .navbar img {
        width: 90px;
        height: 90px;
    }

    .content {
        padding: 40px;
        max-width: 900px;
    }

    .section-title {
        font-size: 28px;
    }

    .item {
        padding: 25px;
    }

    .item h3 {
        font-size: 22px;
    }

    .item p {
        font-size: 16px;
    }
}

    </style>
</head>

<body>

    <div class="navbar">
        <img src="comm.png" alt="icon">
        <h1>مكتبة الجرعات النفسية</h1>
        <button class="back-btn" onclick="window.location.href='student-dashboard.html'">رجوع</button>
    </div>

    <div class="content">

        <h2 class="section-title">اختاري نوع المحتوى</h2>

        <div class="item">

            <!-- صورة من عندك — بس بدك تحطي اسمها -->
            <img src="bdee.png" alt="card-image">

            <h3>فيديوهات قصيرة</h3>
            <p>مهارات خفض القلق – الذكاء العاطفي – تنظيم العواطف.</p>
            <button class="btn" onclick="window.location.href='videos-display.html'">مشاهدة</button>
        </div>

    </div>
</body>
</html>
