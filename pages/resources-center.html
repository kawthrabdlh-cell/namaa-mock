<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مركز الموارد الإرشادية</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===========================
   خلفية فاتحة + حركة ناعمة
=========================== */
body {
    margin: 0;
    padding: 0;
    font-family: "Tajawal", sans-serif;
    background:
        radial-gradient(circle at 20% 20%, rgba(180,255,200,0.55), transparent 55%),
        radial-gradient(circle at 80% 80%, rgba(160,255,190,0.45), transparent 55%),
        linear-gradient(135deg,
            #a9ffcb 0%,
            #f6fff6 25%,
            #cff5f8 50%,
            #befdbe 75%,
            #ffffff 100%
        );
    background-size: 300% 300%;
    animation: bgShift 14s ease-in-out infinite;
    min-height: 100vh;
    color: #064d2a;
}

@keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 60%; }
    100% { background-position: 0% 50%; }
}

/* ===========================
   NAVBAR
=========================== */
.navbar {
    width: 100%;
    padding: 15px 40px;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 700;
    color: #064d2a;
}

.back-btn {
    padding: 10px 18px;
    background: #1b5e20;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    border: none;
    transition: 0.3s;
}

.back-btn:hover {
    background: #2e7d32;
    transform: translateY(-2px);
}

/* ===========================
   CONTENT
=========================== */
.content {
    padding: 40px 20px;
    max-width: 900px;
    margin: auto;
}

/* ===========================
   TABS
=========================== */
.tabs {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.tab {
    padding: 12px 20px;
    background: rgba(255,255,255,0.35);
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    color: #064d2a;
    transition: 0.3s;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.6);
}

.tab:hover {
    background: rgba(0,224,140,0.35);
    color: #fff;
}

.tab.active {
    background: rgba(0,194,122,0.85);
    color: #fff;
}

/* ===========================
   GLASSY RESOURCE CARDS
=========================== */
.resource-item {
    background: rgba(255,255,255,0.22);
    border: 1px solid rgba(255,255,255,0.55);
    padding: 22px;
    border-radius: 18px;
    margin-bottom: 25px;
    backdrop-filter: blur(18px);
    box-shadow:
        0 10px 35px rgba(0,0,0,0.12),
        0 0 25px rgba(0,150,80,0.12);
    animation: fadeIn 0.8s ease forwards;
    opacity: 0;
    border-right: 6px solid #00c27a;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.resource-item h3 {
    margin: 0 0 8px;
    color: #064d2a;
    font-size: 22px;
}

.resource-item p {
    margin: 0 0 12px;
    color: #0a5c32;
    font-size: 15px;
}

/* ===========================
   BUTTON
=========================== */
.btn {
    padding: 10px 14px;
    background: rgba(13, 194, 0, 0.95);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    border: none;
    transition: 0.3s;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

.btn:hover {
    background: rgba(0,224,140,1);
    transform: translateY(-3px);
}

/* ===========================
   🌿 GLOBAL FIXES
   =========================== */
body {
    overflow-x: hidden;
}

img {
    max-width: 100%;
    height: auto;
}

/* ===========================
   🌿 MOBILE-FIRST BASE
   =========================== */

/* NAVBAR */
.navbar {
    padding: 12px 20px;
    flex-direction: column;
    gap: 10px;
    text-align: center;
}

.navbar h1 {
    font-size: 20px;
}

.back-btn {
    width: 100%;
    max-width: 180px;
    padding: 10px 14px;
    font-size: 14px;
}

/* CONTENT */
.content {
    padding: 20px;
    max-width: 100%;
}

.section-title {
    font-size: 20px;
    text-align: center;
}

/* TABS */
.tabs {
    justify-content: center;
    gap: 10px;
}

.tab {
    padding: 10px 14px;
    font-size: 14px;
}

/* RESOURCE CARDS */
.resource-item {
    padding: 16px;
    border-radius: 14px;
}

.resource-item h3 {
    font-size: 18px;
}

.resource-item p,
.resource-item li {
    font-size: 14px;
}

/* ===========================
   🌿 MEDIUM SCREENS ≥ 600px
   =========================== */
@media (min-width: 600px) {

    .navbar {
        flex-direction: row;
        justify-content: space-between;
        padding: 15px 40px;
        text-align: right;
    }

    .navbar h1 {
        font-size: 22px;
    }

    .back-btn {
        width: auto;
        padding: 10px 18px;
    }

    .content {
        padding: 30px;
        max-width: 700px;
    }

    .section-title {
        font-size: 24px;
    }

    .tab {
        padding: 12px 18px;
        font-size: 15px;
    }

    .resource-item {
        padding: 20px;
    }

    .resource-item h3 {
        font-size: 20px;
    }

    .resource-item p,
    .resource-item li {
        font-size: 15px;
    }
}

/* ===========================
   🌿 LARGE SCREENS ≥ 900px
   =========================== */
@media (min-width: 900px) {

    .navbar h1 {
        font-size: 26px;
    }

    .content {
        padding: 40px;
        max-width: 900px;
    }

    .section-title {
        font-size: 26px;
    }

    .tab {
        padding: 12px 20px;
        font-size: 16px;
    }

    .resource-item {
        padding: 22px;
    }

    .resource-item h3 {
        font-size: 22px;
    }

    .resource-item p,
    .resource-item li {
        font-size: 16px;
    }
}

</style>
</head>

<body>

<div class="navbar">
    <h1>مركز الموارد الإرشادية</h1>
    <button class="back-btn" onclick="history.back()">رجوع</button>
</div>

<div class="content">

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-target="ppt">عروض تقديمية</div>
        <div class="tab" data-target="worksheet">أوراق عمل</div>
        <div class="tab" data-target="wordwall">ألعاب Wordwall</div>
    </div>

    <!-- عروض تقديمية -->
    <div class="resource-item" data-section="ppt">
        <h3>عروض تقديمية</h3>
        <p>هنا تجد المرشدة ما يسرّها.</p>
    </div>

    <!-- أوراق عمل -->
    <div class="resource-item" data-section="worksheet" style="display:none;">
        <h3>أوراق عمل تفاعلية</h3>
        <p>هنا تجد المرشدة ما يسرّها.</p>
    </div>

    <!-- ألعاب Wordwall -->
    <div class="resource-item" data-section="wordwall" style="display:none;">
        <h3>ألعاب Wordwall</h3>
        <p>روابط جاهزة:</p>

        <ul style="padding-right:20px; line-height:1.9; font-size:15px;">
            <li><a href="https://wordwall.net/resource/26561503" target="_blank">تمييز المشاعر</a></li>
            <li><a href="https://wordwall.net/resource/5878828" target="_blank">السلوك الإيجابي والسلبي</a></li>
            <li><a href="https://wordwall.net/resource/17614452" target="_blank">إدارة الوقت</a></li>
            <li><a href="https://wordwall.net/resource/2981406" target="_blank">مهارات التواصل</a></li>
            <li><a href="https://wordwall.net/resource/26561489" target="_blank">حلّ المشكلات</a></li>
        </ul>
    </div>

</div>

<script>
const tabs = document.querySelectorAll(".tab");
const sections = document.querySelectorAll("[data-section]");

tabs.forEach(tab => {
    tab.addEventListener("click", () => {
        const target = tab.dataset.target;

        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");

        sections.forEach(sec => {
            sec.style.display = sec.dataset.section === target ? "block" : "none";
        });
    });
});
</script>

</body>
</html>
